<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Score Master Always Log</title>
    <style>
        :root { --bg: #0e1117; --card: #262730; --primary: #ff4b4b; --text: #fafafa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 8px; }
        
        /* Sidebar & Overlay */
        #sidebar { position: fixed; left: -280px; top: 0; width: 250px; height: 100%; background: var(--card); border-right: 1px solid #444; transition: 0.3s; padding: 15px; z-index: 1000; overflow-y: auto; }
        #sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        
        /* Layout */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 100%; }
        
        /* Player Card */
        .card { background: var(--card); border: 1px solid #444; border-radius: 8px; padding: 5px; text-align: center; display: flex; flex-direction: column; min-height: 180px; }
        .name { font-size: 11px; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .score { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        
        /* Controls */
        .controls { display: flex; gap: 3px; margin-bottom: 5px; }
        button { border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; }
        .btn-plus { background: #2e7d32; flex: 1; padding: 8px 0; font-size: 16px; }
        .btn-minus { background: #c62828; flex: 1; padding: 8px 0; font-size: 16px; }
        
        input[type="number"] { width: 90%; background: #0e1117; border: 1px solid #444; color: white; text-align: center; padding: 4px; border-radius: 4px; font-size: 11px; margin: 0 auto 5px auto; }

        /* Individuel Logs (Toujours affichés) */
        .player-history { 
            font-size: 9px; 
            color: #aaa; 
            margin-top: 5px; 
            flex-grow: 1;
            overflow-y: auto; 
            border-top: 1px solid #333; 
            padding-top: 4px; 
            text-align: left;
            max-height: 70px; /* Limite pour garder la grille compacte */
        }
        .log-entry { border-bottom: 1px solid #1f2128; padding: 2px 0; display: flex; justify-content: space-between; }
        
        /* Custom Scrollbar pour les petits logs */
        .player-history::-webkit-scrollbar { width: 2px; }
        .player-history::-webkit-scrollbar-thumb { background: #444; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>⚙️ Configuration</h3>
        <label style="font-size:12px;">Nombre de joueurs :</label>
        <input type="number" id="nb-input" min="1" max="24" style="width:50px; margin-bottom:15px;">
        <div id="names-editor"></div>
        <button style="background:var(--primary); width:100%; padding:10px; margin-top:10px;" onclick="toggleSidebar()">Fermer</button>
        <button style="background:#444; width:100%; padding:10px; margin-top:10px;" onclick="resetAll()">🗑️ Reset Complet</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="header">
        <button style="background:transparent; font-size:20px; color:white;" onclick="toggleSidebar()">☰</button>
        <h2 style="color:var(--primary); font-size:16px; margin:0;">SCORE MASTER</h2>
        <div style="width:30px;"></div>
    </div>

    <div id="player-grid" class="grid"></div>

    <script>
        let state = JSON.parse(localStorage.getItem('scoreStateV4')) || {
            players: [
                { id: 0, name: "J1", score: 0, history: [] },
                { id: 1, name: "J2", score: 0, history: [] },
                { id: 2, name: "J3", score: 0, history: [] },
                { id: 3, name: "J4", score: 0, history: [] }
            ]
        };

        function save() { localStorage.setItem('scoreStateV4', JSON.stringify(state)); }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('open');
            document.getElementById('overlay').style.display = sb.classList.contains('open') ? 'block' : 'none';
            if(sb.classList.contains('open')) renderConfig();
        }

        function updateScore(id, pts) {
            if (!pts || isNaN(pts)) return;
            const p = state.players.find(p => p.id === id);
            p.score += pts;
            
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const ptsStr = pts > 0 ? `+${pts}` : pts;
            
            p.history.unshift({ time: timeStr, val: ptsStr });
            if (p.history.length > 30) p.history.pop();
            
            save(); render();
        }

        function render() {
            const grid = document.getElementById('player-grid');
            grid.innerHTML = '';
            state.players.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const logHtml = p.history.map(h => `
                    <div class="log-entry">
                        <span>${h.time}</span>
                        <span style="color:${h.val.toString().includes('+') ? '#4caf50' : '#ff4b4b'}">${h.val}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="name">${p.name}</div>
                    <div class="score">${p.score}</div>
                    <div class="controls">
                        <button class="btn-plus" onclick="updateScore(${p.id}, 1)">+</button>
                        <button class="btn-minus" onclick="updateScore(${p.id}, -1)">-</button>
                    </div>
                    <input type="number" placeholder="Pts" onchange="updateScore(${p.id}, parseInt(this.value)); this.value=''">
                    <div class="player-history">${logHtml || '<div style="text-align:center; color:#444;">Aucun point</div>'}</div>
                `;
                grid.appendChild(card);
            });
        }

        function renderConfig() {
            const container = document.getElementById('names-editor');
            const nbInput = document.getElementById('nb-input');
            nbInput.value = state.players.length;
            container.innerHTML = '';
            state.players.forEach((p, i) => {
                const div = document.createElement('div');
                div.style.marginBottom = "5px";
                div.innerHTML = `<input type="text" value="${p.name}" style="width:90%; padding:5px; background:#0e1117; border:1px solid #444; color:white; border-radius:4px;" oninput="state.players[${i}].name = this.value; save(); render();">`;
                container.appendChild(div);
            });
            nbInput.onchange = (e) => {
                const val = parseInt(e.target.value);
                if (val > state.players.length) {
                    for(let i=state.players.length; i<val; i++) state.players.push({id: i, name: `J${i+1}`, score:0, history:[]});
                } else { state.players = state.players.slice(0, val); }
                save(); render(); renderConfig();
            };
        }

        function resetAll() {
            if(confirm("Tout remettre à zéro ?")) {
                state.players.forEach(p => { p.score = 0; p.history = []; });
                save(); render(); toggleSidebar();
            }
        }

        render();
    </script>
</body>
</html>
