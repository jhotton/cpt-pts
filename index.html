<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Score Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg: #0e1117; --card: #262730; --primary: #ff4b4b; --text: #fafafa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 5px; overflow-x: hidden; }
        
        /* Sidebar & Overlay */
        #sidebar { position: fixed; left: -280px; top: 0; width: 250px; height: 100%; background: var(--card); border-right: 1px solid #444; transition: 0.3s; padding: 15px; z-index: 1000; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        
        /* Header & Grid */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding: 0 5px; }
        #player-grid { display: grid; gap: 4px; width: 100%; }
        
        /* Player Card */
        .card { 
            background: var(--card); border: 1px solid #444; border-radius: 6px; 
            padding: 5px; text-align: center; display: flex; flex-direction: column; 
            min-height: 220px; min-width: 0; 
        }
        .name { font-size: 10px; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .score { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        
        /* Controls */
        .controls { display: flex; flex-direction: column; gap: 3px; margin-bottom: 5px; }
        button { border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; }
        .btn-plus { background: #2e7d32; padding: 10px 0; font-size: 16px; }
        .btn-minus { background: #c62828; padding: 6px 0; font-size: 12px; }
        .btn-action { width: 100%; padding: 10px; margin-top: 8px; font-size: 13px; }
        
        input[type="number"] { width: 90%; background: #0e1117; border: 1px solid #444; color: white; text-align: center; padding: 4px; border-radius: 4px; font-size: 11px; margin: 0 auto 5px auto; }

        /* Individuel Logs */
        .player-history { 
            font-size: 8px; color: #888; margin-top: 4px; flex-grow: 1;
            overflow-y: auto; border-top: 1px solid #333; padding-top: 4px; text-align: left;
            max-height: 90px;
        }
        .log-entry { border-bottom: 1px solid #1f2128; padding: 2px 0; display: flex; justify-content: space-between; }
        
        hr { border: 0; border-top: 1px solid #444; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3 style="margin-top:0;">⚙️ Config</h3>
        <label style="font-size:12px; color:#aaa;">Nombre de joueurs :</label>
        <input type="number" id="nb-input" min="2" max="12" style="width:60px; display:block; margin: 5px 0 15px 0;">
        
        <div id="names-editor"></div>
        
        <button class="btn-action" style="background:#444;" onclick="toggleSidebar()">Fermer Menu</button>
        <button class="btn-action" style="background:#881111;" onclick="resetAll()">🗑️ Reset Complet</button>
        
        <hr>
        <h4 style="font-size:12px; color:#aaa; margin-bottom:10px;">💾 EXPORTER</h4>
        <button class="btn-action" style="background:#2e7d32;" onclick="exportCSV()">Télécharger CSV</button>
        <button class="btn-action" style="background:#1565c0;" onclick="exportTableAsImage()">Enregistrer Image (PNG)</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="header">
        <button style="background:transparent; font-size:24px; color:white;" onclick="toggleSidebar()">☰</button>
        <h2 style="color:var(--primary); font-size:16px; margin:0;">MASTER SCORE</h2>
        <div style="width:30px;"></div>
    </div>

    <div id="player-grid"></div>

    <script>
        // État et Sauvegarde locale
        let state = JSON.parse(localStorage.getItem('scoreStateVFinal')) || {
            players: [
                { id: 0, name: "J1", score: 0, history: [] },
                { id: 1, name: "J2", score: 0, history: [] },
                { id: 2, name: "J3", score: 0, history: [] },
                { id: 3, name: "J4", score: 0, history: [] }
            ]
        };

        function save() { localStorage.setItem('scoreStateVFinal', JSON.stringify(state)); }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('open');
            document.getElementById('overlay').style.display = sb.classList.contains('open') ? 'block' : 'none';
            if(sb.classList.contains('open')) renderConfig();
        }

        function updateScore(id, pts) {
            if (!pts || isNaN(pts)) return;
            const p = state.players.find(p => p.id === id);
            p.score += pts;
            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            p.history.unshift({ time: timeStr, val: pts > 0 ? `+${pts}` : pts });
            if (p.history.length > 25) p.history.pop();
            save(); render();
        }

        function render() {
            const grid = document.getElementById('player-grid');
            grid.style.gridTemplateColumns = `repeat(${state.players.length}, 1fr)`;
            grid.innerHTML = '';
            
            state.players.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                const logHtml = p.history.map(h => `
                    <div class="log-entry">
                        <span>${h.time}</span>
                        <span style="color:${h.val.toString().includes('+') ? '#4caf50' : '#ff4b4b'}">${h.val}</span>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="name">${p.name}</div>
                    <div class="score">${p.score}</div>
                    <div class="controls">
                        <button class="btn-plus" onclick="updateScore(${p.id}, 1)">+</button>
                        <button class="btn-minus" onclick="updateScore(${p.id}, -1)">-</button>
                    </div>
                    <input type="number" placeholder="Pts" onchange="updateScore(${p.id}, parseInt(this.value)); this.value=''">
                    <div class="player-history">${logHtml}</div>
                `;
                grid.appendChild(card);
            });
        }

        function renderConfig() {
            const container = document.getElementById('names-editor');
            const nbInput = document.getElementById('nb-input');
            nbInput.value = state.players.length;
            container.innerHTML = '';
            state.players.forEach((p, i) => {
                const input = document.createElement('input');
                input.type = 'text'; input.value = p.name;
                input.style = "width:90%; padding:6px; background:#0e1117; border:1px solid #444; color:white; border-radius:4px; margin-bottom:5px;";
                input.oninput = (e) => { state.players[i].name = e.target.value; save(); render(); };
                container.appendChild(input);
            });
            nbInput.onchange = (e) => {
                const val = Math.min(12, Math.max(2, parseInt(e.target.value)));
                if (val > state.players.length) {
                    for(let i=state.players.length; i<val; i++) state.players.push({id: i, name: `J${i+1}`, score:0, history:[]});
                } else { state.players = state.players.slice(0, val); }
                save(); render(); renderConfig();
            };
        }

        function resetAll() {
            if(confirm("Réinitialiser tous les scores et historiques ?")) {
                state.players.forEach(p => { p.score = 0; p.history = []; });
                save(); render(); toggleSidebar();
            }
        }

        // --- FONCTIONS EXPORT ---
        function getFileName(ext) {
            const now = new Date();
            const dateStr = now.toLocaleDateString('fr-FR').replace(/\//g, '-');
            const timeStr = now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'}).replace(':', 'h');
            return `Master-Score_${dateStr}_${timeStr}.${ext}`;
        }

        function exportCSV() {
            let csv = "\uFEFFJoueur;Score;Historique\n";
            state.players.forEach(p => {
                const h = p.history.map(item => `${item.time}:${item.val}`).join(' | ');
                csv += `${p.name};${p.score};"${h}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = getFileName("csv");
            link.click();
        }

        function exportTableAsImage() {
            toggleSidebar(); // On ferme le menu pour la photo
            setTimeout(() => {
                html2canvas(document.body, { backgroundColor: "#0e1117" }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = getFileName("png");
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                });
            }, 500);
        }

        render();
    </script>
</body>
</html>
